<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Codeneir — Human-First Digital Product Studio</title>
    <meta name="description" content="Codeneir designs mobile apps, SaaS platforms, AI assistants, SEO systems, and automation tools that solve real human problems. Based in Milan, serving worldwide." />
    <meta name="author" content="Codeneir Inc" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://codeneir.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codeneir.com" />
    <meta property="og:title" content="Codeneir — Human-First Digital Product Studio" />
    <meta property="og:description" content="Mobile apps, SaaS platforms, AI assistants, SEO systems, and automation tools. Built for real growth. Based in Milan, serving worldwide." />
    <meta property="og:image" content="https://codeneir.com/assets/images/codeneir-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Codeneir — Human-First Digital Product Studio" />
    <meta property="og:site_name" content="Codeneir" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://codeneir.com" />
    <meta name="twitter:title" content="Codeneir — Human-First Digital Product Studio" />
    <meta name="twitter:description" content="Mobile apps, SaaS platforms, AI assistants, SEO systems, and automation tools. Built for real growth." />
    <meta name="twitter:image" content="https://codeneir.com/assets/images/codeneir-share.jpg" />
    <meta name="twitter:image:alt" content="Codeneir — Human-First Digital Product Studio" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#05070D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Codeneir" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://codeneir.com/#organization",
      "name": "Codeneir",
      "alternateName": "Codeneir Product Studio",
      "url": "https://codeneir.com/",
      "logo": "https://codeneir.com/favicon.svg",
      "description": "A digital product studio building technology that solves real human problems.",
      "email": "contact@codeneir.com",
      "telephone": "+39-351-925-2982",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+39-351-925-2982",
        "contactType": "customer service",
        "email": "contact@codeneir.com",
        "areaServed": "Worldwide"
      },
      "sameAs": [
        "https://github.com/codeneir",
        "https://twitter.com/codeneir"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
